name: Validate quest data

on:
  pull_request:
    paths: ['quests/**', 'fragments/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Validate
        run: dotnet run --project questforge-tools/qf-validate -- . --format json > results.json
        continue-on-error: true

      - name: Comment and annotate PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { results, summary } = JSON.parse(fs.readFileSync('results.json', 'utf8'));

            // Inline annotations — startLine enables inline display in Files Changed
            for (const err of results) {
              const fn = err.severity === 'error' ? core.error : core.warning;
              const props = { file: err.file, title: err.code };
              if (err.line) props.startLine = err.line;
              fn(`[${err.code}] ${err.location}: ${err.message}`, props);
            }

            // PR comment with a formatted summary
            const icon    = summary.errors > 0 ? '❌' : summary.warnings > 0 ? '⚠️' : '✅';
            const status  = summary.errors > 0 ? 'Validation failed.' : summary.warnings > 0 ? 'Validation passed with warnings.' : 'Validation passed.';
            const rows    = results.map(e => {
              const sev = e.severity === 'error' ? '🔴 error' : '🟡 warning';
              const stepId = e.stepId ? ` (step: \`${e.stepId}\`)` : '';
              return `| ${sev} | \`${e.code}\` | \`${e.file}\` | \`${e.location}\`${stepId} | ${e.message} |`;
            });

            const body = rows.length === 0
              ? `## ${icon} qf-validate — ${status}\n\nNo issues found.`
              : [
                  `## ${icon} qf-validate — ${status}`,
                  '',
                  `**${summary.errors} error(s), ${summary.warnings} warning(s)**`,
                  '',
                  '| Severity | Code | File | Location | Message |',
                  '|----------|------|------|----------|---------|',
                  ...rows
                ].join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (summary.errors > 0) core.setFailed(`${summary.errors} error(s)`);